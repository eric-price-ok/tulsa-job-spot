{% extends "base.html" %}
{% block title %}Site Settings — Admin{% endblock %}

{% block content %}
<div class="container">
  <div class="page-header">
    <h1 class="page-header__title">Site Settings</h1>
    <a href="/admin" class="btn btn--ghost btn--sm">← Admin</a>
  </div>

  <div class="panel" style="max-width:560px">
    <div class="panel__header"><h2 class="panel__title">Feature Toggles</h2></div>
    <div class="panel__body">
      <form method="POST" action="/admin/settings">
        <div class="form-group" style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1.25rem">
          <input type="checkbox" id="recruiters_page_enabled" name="recruiters_page_enabled"
                 {% if site_settings.recruiters_page_enabled %}checked{% endif %}
                 style="width:1.1rem;height:1.1rem;cursor:pointer;margin-top:.2rem;flex-shrink:0">
          <label for="recruiters_page_enabled" style="cursor:pointer">
            <strong>Recruiters page</strong>
            <span class="text-muted text-sm" style="display:block">
              Shows a &ldquo;Recruiters&rdquo; link in the nav and a dedicated page listing companies
              in the Recruiting industry.
            </span>
          </label>
        </div>

        <div class="form-group" style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1.5rem;padding-left:1.75rem">
          <input type="checkbox" id="job_boards_section_enabled" name="job_boards_section_enabled"
                 {% if site_settings.job_boards_section_enabled %}checked{% endif %}
                 style="width:1.1rem;height:1.1rem;cursor:pointer;margin-top:.2rem;flex-shrink:0">
          <label for="job_boards_section_enabled" style="cursor:pointer">
            <strong>Job boards section</strong>
            <span class="text-muted text-sm" style="display:block">
              Adds a second table to the Recruiters page listing companies in the Job Board industry,
              with a note about non-local listings. Only visible when the Recruiters page is enabled.
            </span>
          </label>
        </div>

        <button type="submit" class="btn btn--primary btn--sm">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
